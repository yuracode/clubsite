<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>記事一覧</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="main-body">
<div class="page-container">
    <div class="page-header">
        <a th:href="@{/authors}" class="btn btn-secondary">戻る</a>
        <h1 class="page-title">記事一覧</h1>
    </div>
    <div class="post-list">
        <div th:each="post : ${posts}" class="post-card">
            <div class="post-header">
                <img th:if="${post.author.profileImage}" th:src="${post.author.profileImage}" class="avatar" alt="avatar"/>
                <div th:unless="${post.author.profileImage}" class="avatar-placeholder"></div>
                <div class="post-meta">
                    <h2 class="post-title" th:text="${post.title}"></h2>
                    <div class="post-author">
                        <span>♡</span>
                        <span th:text="${post.author.nickname}"></span>
                    </div>
                </div>
            </div>
            <div class="post-body">
                <p class="post-content" th:text="${post.content}"></p>
                <img th:if="${post.imageUrl}" th:src="${post.imageUrl}" class="post-image" alt="post image"/>
            </div>
            <div class="post-footer">
                <span class="tag" th:text="${post.categoryLabel}"></span>
                <form th:action="@{/post-likes/toggle}" method="post" style="display:inline; float:right;">
                    <input type="hidden" name="postId" th:value="${post.id}"/>
                    <input type="hidden" th:name="redirectTo" th:value="${'/posts?userId=' + post.author.id}"/>
                    <button type="submit"
                            th:class="${likedPostIds.contains(post.id)} ? 'like-btn liked' : 'like-btn'"
                            th:text="${likedPostIds.contains(post.id)} ? '♥ いいね済み' : '♡ いいね'">
                    </button>
                </form>
            </div>
        </div>
        <p th:if="${#lists.isEmpty(posts)}" class="no-data">投稿がありません。</p>
    </div>
</div>
</body>
</html>
