<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新規登録</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">
<div class="auth-container">
    <h1 class="auth-title">新規登録</h1>
    <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>
    <form th:action="@{/register}" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label>ニックネーム</label>
            <input type="text" name="nickname" class="form-input" required/>
        </div>
        <div class="form-group">
            <label>メールアドレス</label>
            <input type="email" name="email" class="form-input" required/>
        </div>
        <div class="form-group">
            <label>パスワード</label>
            <input type="password" name="password" class="form-input" required/>
        </div>
        <div class="form-group">
            <label>プロフィール写真</label>
            <input type="file" name="profileImage" accept="image/*" class="form-input"/>
        </div>
        <button type="submit" class="btn btn-orange btn-block">登録</button>
    </form>
    <p class="auth-link">アカウントをお持ちの方はこちら <a th:href="@{/login}">ログイン</a></p>
</div>
</body>
</html>
