<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新規連絡</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-body">
<div class="form-card">
    <h1 class="auth-title">新規連絡</h1>
    <div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>
    <form th:action="@{/renraku}" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label>タイトル</label>
            <input type="text" name="title" class="form-input" placeholder="内容を入力" required/>
        </div>
        <div class="form-group">
            <label>連絡内容</label>
            <textarea name="content" class="form-textarea" placeholder="内容を入力" rows="4" required></textarea>
        </div>
        <div class="form-group">
            <label>画像・動画選択</label>
            <input type="file" name="image" class="form-input" accept="image/*,video/*"/>
        </div>
        <div class="form-group">
            <label>カテゴリ選択</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="category" value="PRACTICE" required/> 練習</label>
                <label class="radio-label"><input type="radio" name="category" value="TOURNAMENT"/> 大会</label>
                <label class="radio-label"><input type="radio" name="category" value="HOLIDAY"/> 休み</label>
                <label class="radio-label"><input type="radio" name="category" value="OTHER"/> 雑談</label>
            </div>
        </div>
        <div class="btn-row">
            <button type="submit" class="btn btn-green">投稿</button>
            <a th:href="@{/home}" class="btn btn-secondary">戻る</a>
        </div>
    </form>
</div>
</body>
</html>
